<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITパスポート リアルタイム勉強会</title>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Firebase App & Firestore SDK (v9/v10 Compat for simple script tags) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-sub: #475569;
      --border-color: #e2e8f0;
      --correct: #16a34a;
      --wrong: #dc2626;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      background-color: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      background-color: #e0e7ff;
      color: var(--primary);
    }

    .card {
      background-color: var(--card-bg);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-bottom: 24px;
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 8px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      padding: 14px 18px;
      margin-bottom: 12px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option-btn:hover {
      border-color: var(--primary);
      background-color: #f0f7ff;
    }

    .option-btn.selected {
      border-color: var(--primary);
      background-color: #e0e7ff;
      font-weight: bold;
    }

    .btn {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background-color: var(--primary-hover);
    }

    .btn:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .status-panel {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .stat-box {
      flex: 1;
      background: #f1f5f9;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--primary);
    }

    .hidden {
      display: none !important;
    }

    .explanation {
      background-color: #f0fdf4;
      border-left: 4px solid var(--correct);
      padding: 16px;
      border-radius: 4px;
      margin-top: 16px;
    }

    .explanation-header {
      font-weight: bold;
      color: var(--correct);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1 id="app-title">ITパスポート リアルタイム勉強会</h1>
        <p id="user-role-label" style="font-size: 0.9rem; color: var(--text-sub);">モード読み込み中...</p>
      </div>
      <span class="badge" id="status-badge">待機中</span>
    </header>

    <!-- ===== 学生用画面 ===== -->
    <main id="student-view" class="hidden">
      <!-- ログイン / 名前入力 -->
      <div id="student-login-card" class="card">
        <h2>参加者登録</h2>
        <p style="margin-bottom: 12px; color: var(--text-sub);">勉強会で使用するお名前（ニックネーム）を入力してください。</p>
        <input type="text" id="student-name-input" placeholder="例: 山田 太郎" style="width:100%; padding:12px; margin-bottom:16px; border:1px solid var(--border-color); border-radius:6px; font-size:1rem;">
        <button class="btn" id="join-btn">勉強会に参加する</button>
      </div>

      <!-- 待機中画面 -->
      <div id="student-waiting-card" class="card hidden" style="text-align: center; padding: 40px 20px;">
        <h2>講師の開始指示を待っています...</h2>
        <p style="color: var(--text-sub); margin-top: 8px;">画面はこのままでお待ちください。</p>
      </div>

      <!-- 解答入力画面 -->
      <div id="student-quiz-card" class="card hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
          <span class="badge" id="student-q-category">分野</span>
          <span style="font-weight: bold; color: var(--wrong);" id="student-timer">制限時間: --秒</span>
        </div>
        <h2 id="student-q-text" style="border:none;">問題文がここに表示されます</h2>
        <div id="student-options-container">
          <!-- 選択肢ボタンが動的に挿入されます -->
        </div>
        <button class="btn" id="submit-answer-btn" style="width: 100%; margin-top: 12px;" disabled>回答を送信する</button>
      </div>

      <!-- 解答完了 / 解説確認画面 -->
      <div id="student-result-card" class="card hidden">
        <h2 id="student-result-title">集計中・解説モード</h2>
        <div id="student-feedback" style="margin-bottom: 16px; font-weight: bold;"></div>
        <div id="student-explanation-box" class="explanation hidden">
          <div class="explanation-header">💡 正解と解説</div>
          <p id="student-correct-option" style="font-weight: bold; margin-bottom: 8px;"></p>
          <p id="student-explanation-text"></p>
        </div>
      </div>
    </main>

    <!-- ===== 講師（管理）用画面 ===== -->
    <main id="admin-view" class="hidden">
      <!-- 進行コントロールパネル -->
      <div class="card">
        <h2>講師コントロールパネル</h2>
        <div class="status-panel">
          <div class="stat-box">
            <div>回答提出数</div>
            <div class="stat-value" id="admin-answer-count">0</div>
          </div>
          <div class="stat-box">
            <div>正答率</div>
            <div class="stat-value" id="admin-correct-rate">0%</div>
          </div>
        </div>

        <div style="margin-bottom: 16px;">
          <label style="font-weight: bold; display: block; margin-bottom: 6px;">出題する問題を選択:</label>
          <select id="admin-question-select" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 1rem;">
            <!-- 問題リストが挿入されます -->
          </select>
        </div>

        <div class="btn-group">
          <button class="btn" id="btn-start-quiz">出題開始 (回答受付開始)</button>
          <button class="btn" id="btn-show-result" style="background-color: #059669;">回答締め切り & 解説モード表示</button>
          <button class="btn" id="btn-reset-quiz" style="background-color: #64748b;">待機状態に戻す</button>
        </div>
      </div>

      <!-- リアルタイム集計グラフ -->
      <div class="card">
        <h2>リアルタイム集計結果</h2>
        <div style="max-height: 350px; position: relative;">
          <canvas id="resultChart"></canvas>
        </div>
      </div>

      <!-- 現在の問題 & 解説 -->
      <div class="card">
        <h2>現在選択中の問題と解説</h2>
        <p id="admin-q-text" style="font-weight: bold; margin-bottom: 12px;"></p>
        <div id="admin-options-preview" style="margin-bottom: 16px;"></div>
        <div class="explanation">
          <div class="explanation-header">💡 正解 & 解説</div>
          <p id="admin-correct-answer" style="font-weight: bold; margin-bottom: 6px;"></p>
          <p id="admin-explanation-text"></p>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
