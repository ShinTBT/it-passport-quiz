<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITパスポート 模擬試験システム</title>
  <style>
    body { font-family: sans-serif; background: #f4f6f8; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .timer-bar { position: sticky; top: 0; background: #2c3e50; color: #fff; padding: 10px 20px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.2rem; z-index: 100; margin-bottom: 20px; }
    .btn { background: #3498db; color: #fff; border: none; padding: 10px 18px; font-size: 1rem; border-radius: 4px; cursor: pointer; }
    .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
    .btn-danger { background: #e74c3c; }
    .btn-success { background: #2ecc71; }
    .option-btn { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; background: #fafafa; cursor: pointer; font-size: 1rem; }
    .option-btn.selected { background: #d6eaf8; border-color: #3498db; font-weight: bold; }
    .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; }
    .question-list-item { border-bottom: 1px solid #eee; padding: 12px; cursor: pointer; display: flex; justify-content: space-between; }
    .question-list-item:hover { background: #f8f9fa; }
    .badge { padding: 4px 8px; border-radius: 4px; color: #fff; font-size: 0.85rem; }
    .badge-danger { background: #e74c3c; }
    .badge-warning { background: #f39c12; }
    .badge-success { background: #2ecc71; }
    .explanation-box { background: #e8f8f5; border-left: 4px solid #2ecc71; padding: 15px; margin-top: 15px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 学生ログイン画面 -->
    <div id="login-view">
      <h2>ITパスポート 60分模擬試験</h2>
      <p>お名前を入力して試験を開始してください。</p>
      <input type="text" id="student-name" placeholder="氏名を入力" style="width: 80%; padding: 10px; font-size: 1rem; margin-bottom: 15px;"><br>
      <button class="btn btn-success" onclick="startExam()">試験を開始する</button>
    </div>

    <!-- 学生用 試験画面 -->
    <div id="exam-view" style="display: none;">
      <div class="timer-bar">
        <span>試験進行中</span>
        <span id="timer">残り時間: 60:00</span>
        <button class="btn btn-danger" onclick="submitExam(false)">回答を終了して送信</button>
      </div>

      <div id="quiz-container">
        <h3 id="q-number">問題 1 / 100</h3>
        <p id="q-text" style="font-size: 1.1rem; line-height: 1.6;"></p>
        <div id="options-container"></div>
        <div class="nav-btns">
          <button class="btn" id="prev-btn" onclick="changeQuestion(-1)">前の問題</button>
          <button class="btn" id="next-btn" onclick="changeQuestion(1)">次の問題</button>
        </div>
      </div>

      <!-- 解答終了後の待機/解説画面 -->
      <div id="result-view" style="display: none; text-align: center; padding: 40px 0;">
        <h2>回答を送信しました！</h2>
        <p>全体の集計が完了するまでこのままお待ちください。</p>
        <div id="student-explanation" style="text-align: left; margin-top: 30px;"></div>
      </div>
    </div>

    <!-- 講師用 管理画面 (URL末尾に ?mode=admin で開く) -->
    <div id="admin-view" style="display: none;">
      <h2>講師コントロールパネル (100問集計)</h2>
      <div style="background: #eee; padding: 15px; border-radius: 6px; margin-bottom: 20px;">
        <p><strong>現在の提出人数:</strong> <span id="submitted-count" style="font-size: 1.5rem; color: #2c3e50;">0</span> 名</p>
      </div>

      <h3>正答率 ワーストランキング (低正答率順)</h3>
      <p style="font-size: 0.9rem; color: #666;">※クリックすると、全学生の画面をその問題の解説画面へ一斉切替します。</p>
      <div id="ranking-list"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
